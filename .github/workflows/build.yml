name: Build

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false
      tags:
        type: string
        default: servo:ci

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install f3d
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libegl1 libosmesa6 libosmesa6-dev libgomp1
          curl -fsSL \
            "https://github.com/f3d-app/f3d/releases/download/v3.2.0/f3d-3.2.0-Linux-x86_64.tar.gz" \
            -o /tmp/f3d.tar.gz
          mkdir /tmp/f3d && tar -xzf /tmp/f3d.tar.gz -C /tmp/f3d --strip-components=1
          sudo cp /tmp/f3d/bin/f3d /usr/local/bin/f3d
          sudo cp -r /tmp/f3d/lib/* /usr/local/lib/
          sudo ldconfig
          rm -rf /tmp/f3d /tmp/f3d.tar.gz

      - name: Build CSS
        run: npm ci && npm run css:build

      - name: Run tests
        env:
          F3D_RENDERING_BACKEND: osmesa
        run: clojure -M:test

      - name: Build uberjar
        run: clojure -T:build uber

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
