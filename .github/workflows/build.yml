name: Build

on:
  workflow_call:
    inputs:
      push:
        type: boolean
        default: false
      tags:
        type: string
        default: servo:ci

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install f3d
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends f3d libf3d-plugin-native libosmesa6 libosmesa6-dev

      - name: Build CSS
        run: npm ci && npm run css:build

      - name: Run tests
        run: clojure -M:test

      - name: Build uberjar
        run: clojure -T:build uber

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
